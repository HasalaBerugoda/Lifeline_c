const auth = checkAuth(['donor', 'updater', 'admin']);
</script>

<div class="hero-header">
    
    <h1 class="hero-title">My Donation History</h1>
    <p class="hero-subtitle">Every contribution you make is logged below. Thank you for your service.</p>
</div>

<div class="container overlap-container">
    <!-- Stat Summary Cards -->
    <div class="row g-4 mb-4">
        <div class="col-md-4">
            <div class="premium-card text-center py-4">
                <div class="stat-number" id="stats-total">0</div>
                <div class="stat-label">Total Logs</div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="premium-card text-center py-4">
                <div class="stat-number" id="stats-volume">0 ml</div>
                <div class="stat-label">Total Volume</div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="premium-card text-center py-4">
                <div class="stat-number" id="stats-lives">0</div>
                <div class="stat-label">Lives Impacted</div>
            </div>
        </div>
    </div>

    <!-- History Table -->
    <div class="row">
        <div class="col-12">
            <div class="premium-card">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h3 class="font-heading text-dark mb-0">Donation Logs</h3>
                    <a href="donor.html" class="btn btn-pill btn-outline-crimson btn-sm"><i class="bi bi-arrow-left"></i> Back to Dashboard</a>
                </div>

                <div class="table-responsive">
                    <table class="table table-striped table-hover align-middle">
                        <thead>
                            <tr>
                                <th>Date</th>
                                <th>Location</th>
                                <th>Volume (ml)</th>
                                <th>Hemoglobin (g/dL)</th>
                                <th>Blood Pressure</th>
                                <th>Weight (kg)</th>
                            </tr>
                        </thead>
                        <tbody id="history-table-body">
                            <tr>
                                <td colspan="6" class="text-center py-4 text-secondary">
                                    <div class="spinner-border spinner-border-sm text-danger me-1"></div> Loading history logs...
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', async function() {
    try {
        const result = await apiFetch('api/donations.html');
        if (result.status === 'success') {
            const donations = result.data;
            const summary = result.summary;
            
            // Set stats
            document.getElementById('stats-total').textContent = summary.total_donations;
            document.getElementById('stats-volume').textContent = summary.total_volume_ml + " ml";
            document.getElementById('stats-lives').textContent = summary.lives_saved_estimate;

            const tbody = document.getElementById('history-table-body');
            tbody.innerHTML = '';

            if (donations.length > 0) {
                donations.forEach(d => {
                    const row = document.createElement('tr');
                    
                    const formattedDate = new Date(d.donation_date).toLocaleDateString('en-US', {
                        year: 'numeric', month: 'long', day: 'numeric'
                    });

                    row.innerHTML = `
                        <td class="fw-bold">${formattedDate}</td>
                        <td>${d.location || 'Central Clinic'}</td>
                        <td><span class="badge bg-secondary rounded-pill px-3">${d.volume_ml} ml</span></td>
                        <td>${d.hemoglobin ? d.hemoglobin + ' g/dL' : '<span class="text-white-50">—</span>'}</td>
                        <td>${d.blood_pressure || '<span class="text-white-50">—</span>'}</td>
                        <td>${d.weight ? d.weight + ' kg' : '<span class="text-white-50">—</span>'}</td>
                    `;
                    tbody.appendChild(row);
                });
            } else {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="6" class="text-center py-4 text-secondary">
                            <i class="bi bi-droplet-x text-danger fs-1 d-block mb-2"></i>
                            No donation logs found in the system. Log your first donation today!
                        </td>
                    </tr>
                `;
            }
        }
    } catch (e) {
        console.error('Failed to load donation logs history table', e);
        document.getElementById('history-table-body').innerHTML = `
            <tr>
                <td colspan="6" class="text-center text-danger py-4">Failed to load history data.</td>
            </tr>
        `;
    }
});
</script>
